{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="stylesheet" href="{% static 'login.css' %}">
	<meta http-equiv="content-type" content="text/html; charset=UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{title}}</title>
	<link rel="preconnect" href="https://fonts.gstatic.com">
	<link type="image/x-icon" href="{% static "pic\icons8-спа-цветок-48.png" %}" rel="shortcut icon">
	<link type="Image/x-icon" href="{% static "pic\icons8-спа-цветок-48.png" %}" rel="icon">
</head>
<body>
     <a href="{% url 'index'  %}" class="back-button">← Назад</a>
    <header>
        <h1>Авторизоваться</h1>
    </header>

    <main>
        <form action="/register" method="post">
            <div>
                <label for="username">Имя пользователя:</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div>
                <label for="password">Пароль:</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit">Войти</button>
        </form>

        <p>Еще нету аккаунта ? <a href="{% url 'users:reg'%}">Зарегистрироваться</a></p>
    </main>
</body>
</html>
