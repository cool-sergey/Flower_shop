{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="{% static 'profile.css' %}">
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link type="image/x-icon" href="{% static 'pic/icons8-спа-цветок-48.png' %}" rel="shortcut icon">
    <link type="image/x-icon" href="{% static 'pic/icons8-спа-цветок-48.png' %}" rel="icon">
</head>

<body>
    <a href="{% url 'index' %}" class="back-link">← Назад</a>
<div class="main-container">
    
    <div class="profile-container">
        <h4 class="profile-title">Профиль</h4>

        <div class="profile-image-block">
            <img width="100" height="100" src="{% if  user.image%} {{user.image.url}}{%else%}{% static 'pic\default_user.jpg' %}{%endif%}" class="profile-image">
        </div>

        <form action="{% url 'users:profile' %}" method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div>
                <label for="{{ form.username.id_for_label }}">Имя пользователя</label>
                {{ form.username }}
            </div>

            <div>
                <label for="{{ form.email.id_for_label }}">Адрес электронной почты</label>
                {{ form.email }}
            </div>

            <div>
                <label for="{{ form.image.id_for_label }}">Выберите изображение</label>
                {{ form.image }}
            </div>

            <div>
                <input class="btn-save" type="submit" value="Сохранить">
            </div>
        </form>
    </div>

    {% include "Example/basket.html" %}
    
</div>
    

    
</body>

</html>
