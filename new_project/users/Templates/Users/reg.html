{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="stylesheet" href="{% static 'login.css' %}">
	<meta http-equiv="content-type" content="text/html; charset=UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{title}}</title>
	<link rel="preconnect" href="https://fonts.gstatic.com">
	<link type="image/x-icon" href="{% static "pic\icons8-спа-цветок-48.png" %}" rel="shortcut icon">
	<link type="Image/x-icon" href="{% static "pic\icons8-спа-цветок-48.png" %}" rel="icon">
</head>
<body>
     <a href="{% url 'index'  %}" class="back-button">← Назад</a>
    <header>
        <h1>Entrance</h1>
    </header>

    <main>
        <h2>Форма регистрации</h2>
        <form action="{% url 'users:reg' %}" method="post">
            {% csrf_token %}
            <div>
                <label for="{{form.username.id_for_label}}">Имя пользователя:</label>
                {{form.username}}
            </div>

            <div>
                <label for="{{form.email.id_for_label}}">Email:</label>
                {{form.email}}
            </div>

            <div>
                <label for="{{form.password1.id_for_label}}">Пароль:</label>
                {{form.password1}}
            </div>

            <div>
                <label for="{{form.password2.id_for_label}}">Подтвердите пароль:</label>
                {{form.password2}}
            </div>


            <button type="submit">Зарегистрироваться</button>
        </form>

        <p>Уже есть аккаунт? <a href="{% url 'users:login'%}">Войти</a></p>
    </main>
</body>
</html>
