server {
    listen 8088;
    charset utf8;

    access_log /app/logs/my_site_access.log;
    error_log /app/logs/my_site_error.log error;


    location / {
        proxy_pass http://django:8000;
        proxy_set_header X-Url-Scheme $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_redirect off;
    }

    location /favicon.ico { access_log off;}
    
    location /static/ {
        alias /app/static/;
    }

    location /media/ {
        alias /app/media/;
    }

}