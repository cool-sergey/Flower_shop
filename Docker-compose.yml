services:

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    networks:
      - dbnet
    expose:
      - 8088
    ports:
      - "80:8088"
    volumes:
      - ./new_project/static:/app/static
      - ./new_project/media:/app/media
      - ./new_project/logs:/app/logs
      - ./nginx:/etc/nginx/conf.d
    depends_on:
      - django
  django:
    build: ./new_project
    image: django
    container_name: django
    restart: always
    entrypoint: "/app/entrypoint.sh"
    command: "gunicorn -c gunicorn.py new_project.wsgi"
    env_file:
      - .env
    links:
      - "postgres:dbps"
    networks:
      - dbnet
    volumes:
      - ./new_project:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
  adminer:
    image: adminer
    container_name: adminer
    ports:
      - "8080:8080"
    links:
      - "postgres:db"
    networks:
      - dbnet
    depends_on:
      - postgres

  postgres:
    image: postgres:17-alpine
    container_name: psgr
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DATABASE_NAME}
      - POSTGRES_USER=${DATABASE_USERNAME}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
    networks:
      - dbnet

networks:
  dbnet:
    driver: bridge

volumes:
  postgres-data:
